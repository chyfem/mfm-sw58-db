<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Portal Login — MFM SW58 Araromi Akure</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { margin: 0; }
    .back-link { position:fixed; top:1rem; left:1rem; color:rgba(255,255,255,.7); font-size:.85rem; font-weight:600; z-index:10; }
    .back-link:hover { color:var(--white); }
  </style>
</head>
<body>
<a href="/index.html" class="back-link">← Back to Website</a>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">MFM</div>
      <h2>Staff Portal</h2>
      <p>MFM SW58 Araromi Akure</p>
    </div>
    <div id="login-alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" id="toggle-pw" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" id="login-btn">
        Sign In
      </button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:.82rem;color:var(--gray)">
      © 2024 MFM SW58 Araromi Akure · All rights reserved
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // If already logged in, redirect to dashboard
  if (Auth.isLoggedIn()) window.location.href = '/pages/dashboard.html';

  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const alertEl = document.getElementById('login-alert');
    alertEl.innerHTML = '';
    setLoading(btn, true);

    try {
      const res = await api.post('/auth/login', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      });

      if (res?.ok) {
        Auth.setToken(res.data.token);
        Auth.setUser(res.data.user);
        toast('Welcome back, ' + res.data.user.full_name + '!', 'success');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 800);
      } else {
        alertEl.innerHTML = `<div class="alert alert-error">${res?.data?.message || 'Login failed. Check your credentials.'}</div>`;
        setLoading(btn, false);
      }
    } catch (err) {
      alertEl.innerHTML = '<div class="alert alert-error">Server error. Please try again.</div>';
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
